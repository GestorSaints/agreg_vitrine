<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>AGREG Store</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

  <!-- HEADER -->

  <header>

    <div class="logo-area">

    
        <img src="img/agreg_logo.jpeg" class="log">
    

      
        <img src="img/agreg_slogan2.JPG" class="logon" >
      

    </div>

  </header>

  <!-- MAIN -->

  <main>

    <!-- CAROUSEL -->

    <section class="carousel">

      <div class="slides" id="slides">

      </div>

      <button class="prev" onclick="prevSlide()">
        ❮
      </button>

      <button class="next" onclick="nextSlide()">
        ❯
      </button>

    </section>

    <!-- PRODUTOS -->

    <section class="products">

      <h2 class="products-title">
        Destaques AGREG
      </h2>

      <div class="products-grid"
      id="products-grid">

      </div>

    </section>

  </main>

  <!-- FOOTER -->

  <footer>

    <div class="footer-container">

      <!-- LOGO -->

      <div class="footer-brand">

        <h2>
          AGREG
        </h2>

        <p>
          Moda feminina moderna com identidade premium.
        </p>

      </div>

      <!-- REDES SOCIAIS -->

      <div class="footer-socials">

        <h3>
          Redes Sociais
        </h3>

        <div class="social-icons">

          <a href="https://wa.me/558681799539"
          target="_blank">

            <i class="fa-brands fa-whatsapp"></i>

          </a>

          <a href="https://instagram.com"
          target="_blank">

            <i class="fa-brands fa-instagram"></i>

          </a>

        </div>

      </div>

      <!-- QR CODE -->

      <div class="qr-code">

        <h3>
          WhatsApp
        </h3>

        <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/558681799539"
        alt="QR Code WhatsApp">

      </div>

    </div>

    <div class="copyright">
      © 2026 AGREG - Todos os direitos reservados.
    </div>

  </footer>

  <!-- JS -->

  <script src="script.js"></script>

</body>
</html>
