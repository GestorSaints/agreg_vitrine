<main>
 
  <!-- TÍTULO DA PÁGINA -->

  <section class="topo-clientes">

    <div class="titulo-clientes">

      <h1>Clientes</h1>

      <p>Gerencie os clientes cadastrados da AGREG</p>

    </div>

    <!-- BOTÃO -->

    <button class="btn-novo">

      <i class="fa-solid fa-user-plus"></i>

      Novo Cliente

    </button>

  </section>

  <!-- LISTA DE CLIENTES -->
<!---->

  <section class="lista-clientes-dashboard"></section>

</main>
<!-------------------------------------------------->
<!-- FOOTER CLIENTES -->

<footer class="footer-clientes">

  <div class="footer-container">

    <!-- TÍTULO -->

    <div class="footer-topo">

      <h2>

        <i class="fa-solid fa-user-plus"></i>

        Novo Cliente

      </h2>

      <p>
        Cadastre rapidamente novos clientes no sistema AGREG
      </p>

    </div>

    <!-- FORMULÁRIO -->

    <form class="form-cliente">

      <!-- NOME -->

      <div class="input-group">

        <label for="nome">
          Nome do Cliente
        </label>

        <input
          type="text"
          id="nome"
          placeholder="Digite o nome do cliente"
        >

      </div>

      <!-- WHATSAPP -->

      <div class="input-group">

        <label for="telefone">
          WhatsApp
        </label>

        <input
          type="text"
          id="telefone"
          placeholder="(99) 99999-9999"
        >

      </div>

      <!-- EMAIL -->

      <div class="input-group">

        <label for="email">
          E-mail
        </label>

        <input
          type="email"
          id="email"
          placeholder="cliente@email.com"
        >

      </div>

      <!-- OBSERVAÇÃO -->

      <div class="input-group">

        <label for="obs">
          Observações
        </label>

        <textarea
          id="obs"
          placeholder="Informações adicionais..."
        ></textarea>

      </div>

      <!-- BOTÃO -->

      <button type="submit" class="btn-salvar">

        <i class="fa-solid fa-floppy-disk"></i>

        Salvar Cliente

      </button>

    </form>

  </div>

</footer>

<script src="script_fin.js"></script>
</body>
